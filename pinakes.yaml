schema: IDX Content Vocabulary
version: '1.1'
date: April 2026
schema_owner: Simon Heath
total_nodes: 105
source_key:
  External: Grounded in a regulatory framework or recognised external standard
  Portfolio: "No external standard covers this concept; IDX is the originating authority, grounded in portfolio traffic evidence"
  Market: Market convention or best practice without formal regulatory backing
domains:
